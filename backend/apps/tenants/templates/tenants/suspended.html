<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Suspended</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8f9fa;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 500px;
      }
      .status-code {
        font-size: 6rem;
        font-weight: 700;
        color: #fd7e14;
        line-height: 1;
      }
      h1 {
        font-size: 1.5rem;
        margin: 1rem 0;
        color: #212529;
      }
      p {
        color: #6c757d;
        margin-bottom: 1.5rem;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        padding: 0.5rem 1.5rem;
        background: #0d6efd;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
      }
      a:hover {
        background: #0b5ed7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="status-code">403</div>
      <h1>Account Suspended</h1>
      <p>This account has been suspended. Please contact support for assistance.</p>
      <a href="mailto:support@lankacommerce.com">Contact Support</a>
    </div>
  </body>
</html>
