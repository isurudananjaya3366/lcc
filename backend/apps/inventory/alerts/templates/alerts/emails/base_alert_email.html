<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Stock Alert{% endblock %}</title>
    <style>
      body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: #eee; }
      .container { max-width: 600px; margin: 20px auto; background: #fff; border-radius: 8px; overflow: hidden; }
      .header { background: #2c3e50; color: #fff; padding: 20px; text-align: center; }
      .header h1 { margin: 0; font-size: 22px; }
      .content { padding: 24px; }
      .alert-box { border-left: 4px solid {% block border_color %}#FFC107{% endblock %}; background: {% block bg_color %}#FFF9E6{% endblock %}; padding: 16px; border-radius: 4px; margin-bottom: 20px; }
      table { width: 100%; border-collapse: collapse; margin: 12px 0; }
      td { padding: 6px 8px; }
      td:first-child { font-weight: bold; width: 180px; color: #555; }
      .btn { display: inline-block; padding: 10px 20px; color: #fff; text-decoration: none; border-radius: 4px; margin-right: 8px; margin-top: 8px; font-size: 14px; }
      .footer { text-align: center; padding: 16px; color: #888; font-size: 12px; border-top: 1px solid #eee; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>{% block header %}Stock Alert{% endblock %}</h1>
      </div>
      <div class="content">{% block content %}{% endblock %}</div>
      <div class="footer">
        <p>This is an automated notification. Do not reply.</p>
      </div>
    </div>
  </body>
</html>
