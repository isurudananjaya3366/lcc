<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Payment Notification{% endblock %}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f3f4f6;
        color: #1f2937;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
      }
      .header {
        background-color: #2563eb;
        color: #ffffff;
        padding: 24px 32px;
        text-align: center;
      }
      .header h1 {
        margin: 0;
        font-size: 22px;
      }
      .header p {
        margin: 8px 0 0;
        font-size: 13px;
        opacity: 0.85;
      }
      .content {
        padding: 32px;
      }
      .info-table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
      }
      .info-table td {
        padding: 8px 12px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 14px;
      }
      .info-table td:first-child {
        font-weight: bold;
        width: 40%;
        color: #374151;
      }
      .highlight-box {
        background-color: #eff6ff;
        border-left: 4px solid #2563eb;
        padding: 16px;
        margin: 16px 0;
        border-radius: 4px;
      }
      .success-box {
        background-color: #f0fdf4;
        border-left: 4px solid #16a34a;
        padding: 16px;
        margin: 16px 0;
        border-radius: 4px;
      }
      .warning-box {
        background-color: #fefce8;
        border-left: 4px solid #ca8a04;
        padding: 16px;
        margin: 16px 0;
        border-radius: 4px;
      }
      .cta-button {
        display: inline-block;
        background-color: #2563eb;
        color: #ffffff;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        margin: 16px 0;
      }
      .footer {
        background-color: #f9fafb;
        padding: 24px 32px;
        text-align: center;
        font-size: 12px;
        color: #6b7280;
        border-top: 1px solid #e5e7eb;
      }
      .footer p {
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>{% block header_title %}Payment Notification{% endblock %}</h1>
        <p>{% block header_subtitle %}{% endblock %}</p>
      </div>
      <div class="content">{% block content %}{% endblock %}</div>
      <div class="footer">
        <p>ABC Corporation</p>
        <p>123 Business Street, Colombo 03, Sri Lanka</p>
        <p>+94 11 234 5678 | info@abccorp.lk</p>
        <p style="margin-top: 12px; font-size: 11px">This is an automated email. Please do not reply directly.</p>
      </div>
    </div>
  </body>
</html>
