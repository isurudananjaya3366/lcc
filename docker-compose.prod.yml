# ==================================================
# LankaCommerce Cloud - Production Docker Compose
# ==================================================
# Purpose: Production deployment configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.prod
      args:
        - BUILDKIT_INLINE_CACHE=1
    ports:
      - "8000:8000"  # Behind reverse proxy
    environment:
      - DEBUG=false
      - DJANGO_SETTINGS_MODULE=config.settings.production
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"  # Behind reverse proxy
    environment:
      - NODE_ENV=production
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  db:
    ports: []  # No external access
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    ports: []  # No external access
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.prod
    environment:
      - CELERY_CONCURRENCY=4
      - CELERY_LOG_LEVEL=warning
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  celery-beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.prod
    environment:
      - CELERY_LOG_LEVEL=warning
    deploy:
      replicas: 1  # Must be exactly 1

  flower:
    environment:
      - FLOWER_BASIC_AUTH=${FLOWER_ADMIN}:${FLOWER_PASSWORD}
    ports:
      - "127.0.0.1:5555:5555"  # Localhost only
