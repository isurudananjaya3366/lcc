# ==================================================
# LankaCommerce Cloud - PostgreSQL Configuration
# ==================================================
# Purpose: Development environment database settings
# Version: PostgreSQL 15+
# File:    docker/postgres/postgresql.conf
# Mounted: /etc/postgresql/postgresql.conf (read-only)
#
# Memory sizing rationale (development Docker):
#   Assumes 2-4 GB available to the db container.
#   Production values should be tuned separately
#   based on actual host resources.
# ==================================================

# -------------------------------------------------
# Connection Settings
# -------------------------------------------------
listen_addresses = '*'
port = 5432

# -------------------------------------------------
# Connection Limits
# -------------------------------------------------
# 200 connections to accommodate:
#   - Django backend (CONN_MAX_AGE pool)
#   - Celery workers (concurrency * prefork)
#   - Celery Beat scheduler
#   - pgAdmin / monitoring tools
#   - Headroom for ad-hoc psql sessions
# Connection pooling (e.g. PgBouncer) is recommended
# for production to keep actual connections lower.
# -------------------------------------------------
max_connections = 200
superuser_reserved_connections = 3

# -------------------------------------------------
# Memory Settings
# -------------------------------------------------
# shared_buffers: ~25% of available container memory.
#   With 2 GB container limit → 512 MB is ideal,
#   but 256 MB is safe for development laptops.
shared_buffers = 256MB

# work_mem: Per-sort/hash memory. Keep conservative
#   because max_connections * work_mem can spike.
#   200 connections * 16 MB = 3.2 GB worst case.
work_mem = 16MB

# maintenance_work_mem: Used by VACUUM, CREATE INDEX,
#   ALTER TABLE. Higher speeds up maintenance but is
#   only used by one operation at a time.
maintenance_work_mem = 64MB

# effective_cache_size: Planner hint — total memory
#   expected to be available for disk caching
#   (shared_buffers + OS file cache). ~50-75% of
#   container memory.
effective_cache_size = 512MB

# -------------------------------------------------
# Performance Settings
# -------------------------------------------------
# random_page_cost: Cost estimate for a non-sequential
#   disk page fetch. Lowered from default 4.0 to 1.1
#   because Docker volumes typically use SSDs or fast
#   NVMe storage where random I/O is nearly as fast
#   as sequential I/O.
#
#   SSD ASSUMPTION: This value assumes SSD-backed
#   Docker volumes. For spinning disks, use 2.0-4.0.
random_page_cost = 1.1

# effective_io_concurrency: Number of concurrent disk
#   I/O requests the OS can handle efficiently.
#   - HDD:  2 (sequential access only)
#   - SSD: 200 (high parallelism)
#   - NVMe: 200+ (very high parallelism)
#
#   SSD ASSUMPTION: 200 assumes SSD storage. For HDDs,
#   reduce to 2. This affects bitmap heap scans and
#   prefetch behavior in the query planner.
effective_io_concurrency = 200

# -------------------------------------------------
# Parallel Query Settings
# -------------------------------------------------
# max_parallel_workers_per_gather: Maximum parallel
#   workers for a single Gather/Gather Merge node.
#   2 is conservative for a dev environment with
#   limited CPU cores inside the Docker container.
max_parallel_workers_per_gather = 2

# max_worker_processes: Total background workers
#   including parallel query, autovacuum, and
#   custom background workers. Default is 8.
max_worker_processes = 8

# max_parallel_workers: Maximum workers that can be
#   used for parallel operations at any one time.
#   Should not exceed max_worker_processes.
max_parallel_workers = 4

# max_parallel_maintenance_workers: Workers for
#   parallel index creation and VACUUM operations.
#   2 balances maintenance speed vs. CPU pressure.
max_parallel_maintenance_workers = 2

# parallel_tuple_cost / parallel_setup_cost:
#   Planner cost estimates for parallelism overhead.
#   Defaults are reasonable for most workloads.
#   Lower values encourage more parallel plans.
# parallel_tuple_cost = 0.01
# parallel_setup_cost = 1000.0

# min_parallel_table_scan_size: Minimum table size
#   before the planner considers parallel scan.
#   Default 8MB is fine for development.
# min_parallel_table_scan_size = 8MB

# Background writer tuning
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# -------------------------------------------------
# Autovacuum Settings
# -------------------------------------------------
# Autovacuum is critical for multi-tenant workloads
# because each tenant schema contains its own set of
# tables, all of which accumulate dead tuples from
# UPDATE and DELETE operations.
#
# With many tenant schemas, the default autovacuum
# settings may not keep up, causing table bloat and
# degraded query performance.
# -------------------------------------------------

# autovacuum: Must be on. Never disable in production.
autovacuum = on

# autovacuum_max_workers: Number of concurrent
#   autovacuum processes. With many tenant schemas,
#   more workers ensure vacuuming keeps pace.
#   3 is the default; 4 gives extra capacity for
#   multi-tenant workloads without excessive CPU use.
autovacuum_max_workers = 4

# autovacuum_naptime: Interval between autovacuum
#   runs on each database. Shorter intervals detect
#   bloated tables sooner. 30s is aggressive but
#   appropriate for active multi-tenant databases.
autovacuum_naptime = 30s

# autovacuum_vacuum_threshold: Minimum dead tuples
#   before autovacuum triggers on a table.
#   Default 50 is fine — small tables get vacuumed
#   quickly even with a low threshold.
autovacuum_vacuum_threshold = 50

# autovacuum_vacuum_scale_factor: Fraction of table
#   rows that must be dead before autovacuum triggers.
#   Default 0.2 (20%) is too high for large tenant
#   tables — 10% dead rows on a 1M row table means
#   100K dead tuples before vacuum runs.
#   0.05 (5%) is more aggressive and keeps bloat low.
autovacuum_vacuum_scale_factor = 0.05

# autovacuum_analyze_threshold: Minimum changed rows
#   before auto-analyze runs to update statistics.
#   Default 50 is appropriate.
autovacuum_analyze_threshold = 50

# autovacuum_analyze_scale_factor: Fraction of table
#   rows that must change before analyze triggers.
#   0.02 (2%) keeps statistics fresh, especially for
#   tenant tables with frequent INSERT/UPDATE patterns.
autovacuum_analyze_scale_factor = 0.02

# autovacuum_vacuum_cost_delay: Pause between vacuum
#   I/O operations to reduce impact on active queries.
#   Default 2ms. -1 uses vacuum_cost_delay (20ms).
#   2ms keeps vacuuming fast but responsive.
autovacuum_vacuum_cost_delay = 2ms

# autovacuum_vacuum_cost_limit: Total I/O cost budget
#   per autovacuum cycle before pausing. Higher values
#   let vacuum complete faster at the cost of more I/O.
#   Default is -1 (uses vacuum_cost_limit = 200).
#   400 doubles throughput for multi-tenant workloads.
autovacuum_vacuum_cost_limit = 400

# -------------------------------------------------
# Timeout Settings
# -------------------------------------------------
# Timeouts protect shared resources in a multi-tenant
# environment where one tenant's runaway query or
# abandoned transaction could block others.
# -------------------------------------------------

# statement_timeout: Maximum duration for any single
#   SQL statement. Prevents runaway queries from
#   consuming resources indefinitely.
#   0 = disabled (default). 30s is safe for a web app
#   where most queries complete in under 1 second.
#   Long-running reports should set per-session override.
statement_timeout = 30s

# lock_timeout: Maximum time to wait for a lock.
#   Prevents transactions from waiting indefinitely
#   for row or table locks held by other tenants.
#   10s ensures quick failure instead of queueing.
lock_timeout = 10s

# idle_in_transaction_session_timeout: Maximum time a
#   session can remain idle inside an open transaction.
#   Idle transactions hold locks and prevent autovacuum,
#   causing bloat across tenant schemas.
#   5 minutes is generous for development; production
#   should consider 1-2 minutes.
idle_in_transaction_session_timeout = 300s

# -------------------------------------------------
# Query Statistics (pg_stat_statements)
# -------------------------------------------------
# pg_stat_statements tracks execution statistics for
# all SQL statements, enabling:
#   - Slow query identification
#   - Query pattern analysis across tenants
#   - Index optimization decisions
#   - PgBouncer pool sizing validation
#
# The extension must be preloaded via
# shared_preload_libraries, which requires a restart.
# -------------------------------------------------

# shared_preload_libraries: Load extensions at startup.
#   pg_stat_statements must be preloaded because it
#   hooks into the query execution pipeline.
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements.max: Maximum distinct statements
#   tracked. 5000 is generous for development; each
#   entry uses ~6KB of shared memory (~30MB total).
pg_stat_statements.max = 5000

# pg_stat_statements.track: Which statements to track.
#   'all' includes statements inside functions and
#   procedures, important for tenant lifecycle functions.
pg_stat_statements.track = all

# pg_stat_statements.track_utility: Track utility
#   commands (CREATE, ALTER, etc.) in addition to
#   SELECT/INSERT/UPDATE/DELETE.
pg_stat_statements.track_utility = on

# pg_stat_statements.track_planning: Track planning
#   time separately from execution time. Useful for
#   identifying slow query plans.
pg_stat_statements.track_planning = on

# -------------------------------------------------
# SSL Settings
# -------------------------------------------------
# Development: SSL is disabled because the Docker
#   network is internal and traffic does not leave
#   the host machine.
#
# Production: SSL MUST be enabled. Provide cert/key
#   files via Docker secrets or mounted volumes:
#     ssl = on
#     ssl_cert_file = '/etc/ssl/certs/server.crt'
#     ssl_key_file  = '/etc/ssl/private/server.key'
#     ssl_ca_file   = '/etc/ssl/certs/ca.crt'
#
# The pg_hba.conf reject rule ensures no connections
# are accepted from outside the Docker network, so
# plaintext traffic is contained within the bridge.
# -------------------------------------------------
ssl = off

# -------------------------------------------------
# WAL (Write-Ahead Log) Settings
# -------------------------------------------------
# wal_level: 'replica' enables WAL archiving, streaming
#   replication, and point-in-time recovery (PITR).
#   Required for production backups and read replicas.
wal_level = replica

# max_wal_size: Maximum WAL size before a checkpoint is
#   forced. Larger values reduce checkpoint frequency
#   but use more disk space. 1 GB is reasonable for dev.
max_wal_size = 1GB

# min_wal_size: WAL files below this size are recycled
#   rather than removed, reducing I/O from WAL creation.
min_wal_size = 80MB

# checkpoint_timeout: Maximum time between automatic
#   checkpoints. Default is 5 min; increase to reduce
#   checkpoint frequency during bulk writes.
checkpoint_timeout = 10min

# checkpoint_completion_target: Fraction of the
#   checkpoint interval to spread the checkpoint across.
#   0.9 means spreading I/O over 90% of the interval.
checkpoint_completion_target = 0.9

# -------------------------------------------------
# WAL Archiving (Point-in-Time Recovery)
# -------------------------------------------------
# WAL archiving copies completed WAL segments to an
# archive location, enabling point-in-time recovery
# (PITR) to any moment between base backups.
#
# Development: archive_mode is ON but archive_command
# copies to a local directory. In production, replace
# with a command that sends WAL to object storage
# (S3, GCS, Azure Blob) or a dedicated backup server.
# -------------------------------------------------

# archive_mode: Enable WAL archiving. Requires
#   wal_level >= replica (already set above).
#   Requires a PostgreSQL restart to change.
archive_mode = on

# archive_command: Shell command to copy completed
#   WAL segments to the archive. PostgreSQL calls
#   this for each completed WAL segment.
#
#   %p = full path to the WAL file to archive
#   %f = filename only (without path)
#
#   The command must return exit code 0 on success.
#   If it fails, PostgreSQL retries until it succeeds.
#
#   Development: Copy to /var/lib/postgresql/wal_archive
#   Production examples:
#     aws s3 cp %p s3://bucket/wal/%f
#     gsutil cp %p gs://bucket/wal/%f
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# archive_timeout: Force archiving of a partially-filled
#   WAL segment after this interval. Ensures that WAL
#   data is archived even during periods of low activity.
#   300s (5 minutes) limits maximum data loss window.
#   0 = disabled (only archive when segment is full).
archive_timeout = 300

# -------------------------------------------------
# Logging (Development)
# -------------------------------------------------
# logging_collector: Capture stderr output into log
#   files under pg_log/ inside the data directory.
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# log_statement: 'all' logs every SQL statement.
#   Use 'ddl' or 'mod' in staging/production to
#   reduce noise.
log_statement = 'all'

# log_duration: Log the duration of every completed
#   statement. Useful for spotting slow queries.
log_duration = on

# log_min_duration_statement: Log statements that
#   take longer than this threshold (ms). Set to 0 to
#   log all, or -1 to disable. 100 ms captures slow
#   queries without flooding logs.
log_min_duration_statement = 100

# Additional logging for development diagnostics
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a '
log_checkpoints = on

# -------------------------------------------------
# Locale Settings
# -------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Asia/Colombo'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
