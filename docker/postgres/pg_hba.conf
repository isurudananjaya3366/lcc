# ==================================================
# LankaCommerce Cloud - PostgreSQL Authentication
# ==================================================
# File:    docker/postgres/pg_hba.conf
# Purpose: Host-based authentication rules
# Docs:    https://www.postgresql.org/docs/15/auth-pg-hba-conf.html
#
# Rules are evaluated top-to-bottom; first match wins.
# ==================================================

# TYPE    DATABASE        USER            ADDRESS           METHOD

# -------------------------------------------------
# Local connections (Unix socket)
# -------------------------------------------------
# Superuser (postgres) — trust for local admin tasks
local     all             postgres                          trust

# Application user — password authentication
local     all             all                               scram-sha-256

# -------------------------------------------------
# IPv4 connections (Docker network)
# -------------------------------------------------
# Allow all users from the Docker bridge network
# using SCRAM-SHA-256 password authentication.
host      all             all             172.16.0.0/12     scram-sha-256
host      all             all             192.168.0.0/16    scram-sha-256
host      all             all             10.0.0.0/8        scram-sha-256

# Allow localhost (host machine) connections
host      all             all             127.0.0.1/32      scram-sha-256

# -------------------------------------------------
# IPv6 connections
# -------------------------------------------------
host      all             all             ::1/128           scram-sha-256

# -------------------------------------------------
# Catch-all: reject everything else
# -------------------------------------------------
host      all             all             0.0.0.0/0         reject
host      all             all             ::/0              reject
