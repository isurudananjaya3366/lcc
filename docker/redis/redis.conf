# ==================================================
# LankaCommerce Cloud - Redis Configuration
# ==================================================
# Purpose: Development environment settings
# Version: Redis 7+
# Use Cases: Django cache, Celery broker
# ==================================================

# -------------------------------------------------
# Network Settings
# -------------------------------------------------

# Bind to all interfaces (Docker internal network)
bind 0.0.0.0

# Default Redis port
port 6379

# Connection queue size
tcp-backlog 511

# Timeout for client connections (0 = disabled)
timeout 0

# TCP keepalive
tcp-keepalive 300

# -------------------------------------------------
# Memory Settings
# -------------------------------------------------

# Maximum memory limit (development)
# Allocation: Django cache ~100MB, Celery broker ~100MB,
# Channels ~50MB, buffer ~remaining
maxmemory 256mb

# Eviction policy when maxmemory is reached
# allkeys-lru: Evict least recently used keys
# - Old/unused cache data is automatically removed
# - Operations always succeed (no OOM errors)
# - No manual cleanup needed
maxmemory-policy allkeys-lru

# Number of keys to sample when evicting
maxmemory-samples 5

# -------------------------------------------------
# Persistence Settings
# -------------------------------------------------

# RDB snapshot configuration
# save <seconds> <changes>
# Save if 1 key changed in 15 minutes
save 900 1
# Save if 10 keys changed in 5 minutes
save 300 10
# Save if 10000 keys changed in 1 minute
save 60 10000

# Stop writes on RDB save error
stop-writes-on-bgsave-error yes

# Compress RDB file
rdbcompression yes

# Use RDB file checksum
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Data directory
dir /data

# Disable AOF (not needed for development cache)
# Cache data is regenerable, RDB snapshots are sufficient
appendonly no

# Remove RDB files on replica sync
rdb-del-sync-files no

# -------------------------------------------------
# Logging Settings
# -------------------------------------------------

# Log level (debug, verbose, notice, warning)
loglevel notice

# Log to stdout (Docker captures via docker compose logs)
logfile ""

# Syslog disabled
syslog-enabled no

# -------------------------------------------------
# Security Settings
# -------------------------------------------------

# Protected mode disabled (Docker internal network)
# IMPORTANT: Only safe because Redis is not exposed externally
# For production, enable: protected-mode yes
protected-mode no

# No password for development (set in production)
# requirepass your_password_here
