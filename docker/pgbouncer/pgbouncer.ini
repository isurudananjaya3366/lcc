; ==================================================
; LankaCommerce Cloud - PgBouncer Configuration
; ==================================================
; File:    pgbouncer.ini
; Purpose: Connection pooling for PostgreSQL to
;          reduce connection overhead and support
;          high-concurrency multi-tenant workloads.
;
; Why PgBouncer?
;   django-tenants sets search_path per request,
;   which works well with transaction pooling.
;   Without pooling, each Django worker holds a
;   persistent connection, exhausting PostgreSQL
;   max_connections under load.
;
; Pooling Mode:
;   Transaction mode is required because
;   django-tenants sets search_path at the start
;   of each transaction. Session mode would leak
;   tenant context between requests.
; ==================================================

; ---------------------------------------------------
; [databases] - Upstream PostgreSQL targets
; ---------------------------------------------------
; PgBouncer connects to the real PostgreSQL server
; on behalf of application clients.
; ---------------------------------------------------
[databases]
; Main application database
lankacommerce = host=db port=5432 dbname=lankacommerce

; Test database (used by pytest)
lankacommerce_test = host=db port=5432 dbname=lankacommerce_test

; Wildcard fallback — any database name not listed
; above connects to the same PostgreSQL host.
; Disabled by default; uncomment if needed.
; * = host=db port=5432

; ---------------------------------------------------
; [pgbouncer] - Server settings
; ---------------------------------------------------
[pgbouncer]

; ---- Listen ----
listen_addr = 0.0.0.0
listen_port = 6432

; ---- Authentication ----
; auth_type options:
;   md5    — MD5 password hashing (selected)
;   scram-sha-256 — Stronger but requires PgBouncer 1.21+
;                    and matching auth_query setup
;   trust  — No authentication (insecure)
;   plain  — Plain text (insecure)
;
; MD5 is selected for development because:
;   - Compatible with all PostgreSQL versions
;   - Works with static userlist.txt (no auth_query needed)
;   - Simple credential management for local development
;   - PgBouncer handles client auth; PostgreSQL handles
;     the actual connection with its own pg_hba.conf rules
;
; For production, consider scram-sha-256 with auth_query
; for dynamic credential resolution from PostgreSQL.
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ---- Pooling Mode ----
; TRANSACTION mode is required for django-tenants:
;   - search_path is set per-transaction
;   - Each request gets its own transaction context
;   - No tenant state leaks between requests
;
; SESSION mode is NOT suitable because:
;   - search_path would persist across requests
;   - Different tenants could share a connection
;   - Tenant isolation would be broken
;
; STATEMENT mode is NOT suitable because:
;   - Multi-statement transactions would fail
;   - Django ORM relies on transactions
pool_mode = transaction

; ---- Pool Sizes ----
; default_pool_size: connections per user/database pair.
; With ~200 max_connections on PostgreSQL and overhead
; for superuser + direct connections, we allocate:
;   - 2 database entries × 40 = 80 pooled connections
;   - Leaves 120 for superuser, direct, and headroom
default_pool_size = 40

; min_pool_size: keep this many connections warm to
; avoid connection setup latency on first request
min_pool_size = 5

; reserve_pool_size: extra connections for burst traffic
; These are only used when the main pool is exhausted
; and clients have been waiting > reserve_pool_timeout
reserve_pool_size = 5
reserve_pool_timeout = 3

; max_client_conn: total client connections PgBouncer
; will accept. This can be much higher than PostgreSQL
; max_connections since PgBouncer multiplexes.
max_client_conn = 400

; max_db_connections: hard cap per database on the
; server side. Prevents one database from consuming
; all PostgreSQL connections.
max_db_connections = 80

; max_user_connections: hard cap per user on the
; server side. Set to 0 (unlimited per user) since
; we control access via max_db_connections.
max_user_connections = 0

; ---- Timeouts ----
; server_idle_timeout: close idle server connections
; after this many seconds to free PostgreSQL slots
server_idle_timeout = 300

; client_idle_timeout: close idle client connections
; after this many seconds (0 = disabled)
client_idle_timeout = 0

; client_login_timeout: max seconds for a client to
; complete authentication after connecting
client_login_timeout = 60

; query_timeout: max seconds a query can run before
; PgBouncer terminates it (0 = disabled, let
; PostgreSQL statement_timeout handle it)
query_timeout = 0

; query_wait_timeout: max seconds a client can wait
; for a server connection from the pool
query_wait_timeout = 120

; server_connect_timeout: max seconds to establish a
; connection to PostgreSQL
server_connect_timeout = 15

; server_login_retry: seconds to wait before retrying
; a failed connection to PostgreSQL
server_login_retry = 15

; ---- Logging ----
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Log to stdout for Docker (captured by docker logs)
logfile = /dev/null
syslog = 0

; ---- Admin ----
; Admin console access (via psql to port 6432, db pgbouncer)
admin_users = postgres
stats_users = postgres,lcc_user

; ---- Security ----
; Limit server-side TLS. In development, connections
; between PgBouncer and PostgreSQL stay on the Docker
; bridge network, so TLS is not required.
server_tls_sslmode = disable

; ---- Process ----
pidfile = /var/run/pgbouncer/pgbouncer.pid
